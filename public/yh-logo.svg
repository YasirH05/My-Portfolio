<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="yGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b685ff" />
      <stop offset="100%" stop-color="#7db4ff" />
    </linearGradient>
  </defs>

  <style>
    .h-letter { fill: var(--text-heading, #fff); }
    .y-cutout { stroke: var(--bg-color, #0F1720); }
  </style>

  <!-- H Letter -->
  <path class="h-letter" d="M 105 85 L 125 85 L 125 105 L 155 105 L 155 85 L 175 85 L 175 145 L 155 145 L 155 125 L 125 125 L 125 145 L 105 145 Z" />
  
  <!-- Y Letter Cutout (creates the gap slice) -->
  <path class="y-cutout" d="M 60 70 L 100 120 M 140 70 L 70 155" stroke-width="32" stroke-linecap="butt" />
  
  <!-- Y Letter Foreground -->
  <path d="M 60 70 L 100 120 M 140 70 L 70 155" stroke="url(#yGrad)" stroke-width="20" stroke-linecap="butt" />
</svg>
